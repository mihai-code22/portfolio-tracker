spring:
  application:
    name: portfolio-tracker

  data:
    mongodb:
      uri: mongodb://localhost:27017/portfolio-tracker

  datasource:
    url: jdbc:postgresql://localhost:5432/portfolio
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: admin
      password: admin123

jwt:
  secret: "K7gNU3sdo+OL0wNhqoVWhr3g6s1xYv72ol/pe/Unols="
  expiration: 86400000 # 1 day

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

kafka:
  topics:
    price-updates:
      name: price-updates
  consumer:
    group-id: tracker-service
  bootstrap-servers: localhost:9092

logging:
  level:
    com.portfolio.tracker: DEBUG